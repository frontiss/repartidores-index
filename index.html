<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>Repartos · Comercial Puchol</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;900&family=Barlow:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f0f2f7;
  --surface:  #ffffff;
  --surface2: #f5f6fa;
  --border:   #e4e7ef;
  --orange:   #f5820a;
  --orange-d: #d46e08;
  --orange-bg:#fff4e8;
  --green:    #16a34a;
  --green-bg: #f0fdf4;
  --red:      #dc2626;
  --red-bg:   #fef2f2;
  --blue:     #2563eb;
  --blue-bg:  #eff6ff;
  --teal:     #0891b2;
  --teal-bg:  #ecfeff;
  --purple:   #7c3aed;
  --text:     #111827;
  --text2:    #374151;
  --muted:    #6b7280;
  --muted2:   #d1d5db;
  --r-head:   'Barlow Condensed', sans-serif;
  --r-body:   'Barlow', sans-serif;
  --r-mono:   'DM Mono', monospace;
  --radius:   14px;
  --safe-t:   env(safe-area-inset-top, 0px);
  --safe-b:   env(safe-area-inset-bottom, 0px);
  --tap:      52px; /* minimum tap target height */
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; background: var(--bg);
  color: var(--text); font-family: var(--r-body);
  font-size: 16px; -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}
button { cursor: pointer; border: none; background: none; font-family: inherit; -webkit-tap-highlight-color: transparent; }
input, textarea { font-family: inherit; -webkit-appearance: none; border-radius: 0; }

/* ── SCREENS ── */
.screen { display: none; flex-direction: column; height: 100dvh; overflow: hidden; }
.screen.active { display: flex; }

/* ══════════════════════════════════════
   LOGIN
══════════════════════════════════════ */
#screen-login {
  justify-content: center; align-items: center;
  padding: 1.5rem;
  background: linear-gradient(160deg, #fff8f0 0%, #f0f2f7 60%);
}
.login-logo {
  display: flex; align-items: center; gap: 14px; margin-bottom: 2.5rem;
}
.logo-mark {
  width: 52px; height: 52px; background: var(--orange);
  clip-path: polygon(0 0,68% 0,100% 32%,100% 100%,32% 100%,0 68%);
  flex-shrink: 0;
}
.logo-name { font-family: var(--r-head); font-size: 1.7rem; font-weight: 900; letter-spacing: .04em; text-transform: uppercase; line-height: 1.1; }
.logo-name span { color: var(--orange); }

.login-card {
  width: 100%; max-width: 400px;
  background: var(--surface); border-radius: 20px;
  padding: 2rem 1.75rem;
  box-shadow: 0 4px 24px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
}
.login-title { font-family: var(--r-head); font-size: 2rem; font-weight: 900; text-transform: uppercase; letter-spacing: .02em; margin-bottom: .25rem; }
.login-sub { color: var(--muted); font-size: .9rem; margin-bottom: 1.75rem; }

.field { margin-bottom: 1rem; }
.field label { display: block; font-size: .72rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: .4rem; }
.field input {
  width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 1rem;
  padding: 0 1rem; height: var(--tap); outline: none; transition: border-color .15s;
}
.field input:focus { border-color: var(--orange); background: #fff; }

.btn-primary {
  width: 100%; background: var(--orange); color: #fff;
  font-family: var(--r-head); font-size: 1.15rem; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase;
  height: var(--tap); border-radius: 10px; margin-top: .5rem;
  transition: background .15s, transform .1s;
  box-shadow: 0 2px 12px rgba(245,130,10,.35);
}
.btn-primary:active { background: var(--orange-d); transform: scale(.98); }
.btn-primary:disabled { background: var(--muted2); color: #fff; box-shadow: none; }

.login-error {
  display: none; background: var(--red-bg); border: 1px solid rgba(220,38,38,.2);
  border-radius: 8px; color: var(--red); font-size: .875rem;
  padding: .65rem .9rem; margin-top: 1rem;
}

/* ══════════════════════════════════════
   HEADER
══════════════════════════════════════ */
.app-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: calc(.875rem + var(--safe-t)) 1.25rem .875rem;
  background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.header-logo {
  width: 32px; height: 32px; background: var(--orange);
  clip-path: polygon(0 0,68% 0,100% 32%,100% 100%,32% 100%,0 68%); flex-shrink: 0;
}
.header-title { font-family: var(--r-head); font-size: 1.25rem; font-weight: 900; text-transform: uppercase; letter-spacing: .04em; }
.header-sub { font-size: .75rem; color: var(--muted); margin-top: .05rem; }
.btn-logout {
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 8px; color: var(--muted); font-size: .8rem;
  font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
  padding: .45rem .85rem; min-height: 40px;
}
.btn-logout:active { background: var(--border); }

/* ── TABS ── */
.tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tab-btn {
  flex: 1; padding: 0; height: 48px;
  font-family: var(--r-head); font-size: .95rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .04em; color: var(--muted);
  border-bottom: 3px solid transparent; transition: color .15s, border-color .15s;
}
.tab-btn.active { color: var(--orange); border-bottom-color: var(--orange); }

/* ── DATE BAR ── */
.date-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: .55rem 1rem; background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.date-text { font-family: var(--r-mono); font-size: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
.btn-refresh {
  display: flex; align-items: center; gap: .35rem;
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 8px; color: var(--muted); font-size: .75rem;
  font-weight: 600; text-transform: uppercase; padding: .4rem .75rem; min-height: 36px;
}
.btn-refresh:active { color: var(--orange); background: var(--orange-bg); }

/* ── SCROLL ── */
.scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 1rem 1rem calc(1rem + var(--safe-b)); }

/* ══════════════════════════════════════
   STATS BAR
══════════════════════════════════════ */
.stats-bar { display: grid; grid-template-columns: repeat(3,1fr); gap: .6rem; margin-bottom: 1.1rem; }
.stat-card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: .85rem .5rem;
  text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.04);
}
.stat-num { font-family: var(--r-mono); font-size: 1.8rem; font-weight: 500; line-height: 1; }
.stat-num.orange { color: var(--orange); }
.stat-num.green  { color: var(--green);  }
.stat-num.red    { color: var(--red);    }
.stat-label { font-size: .68rem; color: var(--muted); font-weight: 600; letter-spacing: .07em; text-transform: uppercase; margin-top: .25rem; }

/* ══════════════════════════════════════
   DELIVERY CARDS
══════════════════════════════════════ */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .6rem; margin-top: .2rem; }
.section-title { font-family: var(--r-head); font-size: .8rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }
.section-count { font-family: var(--r-mono); font-size: .75rem; color: var(--muted); }

.delivery-card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--radius); margin-bottom: .7rem;
  overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.05);
  transition: border-color .2s;
}
.delivery-card.entregado { border-color: rgba(22,163,74,.3); }
.delivery-card.entregado .card-header { background: var(--green-bg); }

.card-header {
  display: flex; align-items: center; gap: .85rem;
  padding: 1rem 1rem; min-height: var(--tap);
  cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
}
.card-status {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 1.15rem; font-weight: 700;
}
.card-status.pending { background: var(--orange-bg); color: var(--orange); }
.card-status.done    { background: var(--green-bg);  color: var(--green);  }

.card-info { flex: 1; min-width: 0; }
.card-client { font-weight: 600; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
.card-meta { display: flex; gap: .4rem; margin-top: .3rem; align-items: center; flex-wrap: wrap; }
.card-ref { font-family: var(--r-mono); font-size: .72rem; color: var(--muted); }

.badge {
  font-size: .65rem; font-weight: 700; letter-spacing: .05em;
  text-transform: uppercase; padding: .2rem .45rem; border-radius: 5px;
}
.badge-done    { background: var(--green-bg); color: var(--green); border: 1px solid rgba(22,163,74,.2); }
.badge-pending { background: var(--orange-bg); color: var(--orange); border: 1px solid rgba(245,130,10,.2); }
.badge-cobrado { background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(37,99,235,.15); }
.badge-alb     { background: var(--orange-bg); color: var(--orange); border: 1px solid rgba(245,130,10,.2); }
.badge-fac     { background: var(--teal-bg); color: var(--teal); border: 1px solid rgba(8,145,178,.2); }

.card-arrow { color: var(--muted2); font-size: 1.1rem; transition: transform .2s; flex-shrink: 0; }
.delivery-card.open .card-arrow { transform: rotate(90deg); }

.card-body { display: none; padding: 0 1rem 1rem; border-top: 1px solid var(--border); }
.delivery-card.open .card-body { display: block; }

.card-lines { margin: .75rem 0; }
.card-line {
  display: flex; justify-content: space-between; align-items: center;
  padding: .5rem 0; border-bottom: 1px solid var(--border); font-size: .9rem;
}
.card-line:last-child { border-bottom: none; }
.line-qty { font-family: var(--r-mono); font-size: .8rem; color: var(--orange); font-weight: 500; flex-shrink: 0; margin-left: .5rem; }
.card-note {
  font-size: .82rem; color: var(--text2); margin: .6rem 0;
  padding: .6rem .8rem; background: var(--orange-bg);
  border-radius: 8px; border-left: 3px solid var(--orange);
}

.card-actions { margin-top: .75rem; }
.btn-entregar {
  width: 100%; background: var(--orange); color: #fff;
  font-family: var(--r-head); font-size: 1.05rem; font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase;
  height: var(--tap); border-radius: 10px;
  transition: background .15s, transform .1s;
  box-shadow: 0 2px 8px rgba(245,130,10,.3);
}
.btn-entregar:active { background: var(--orange-d); transform: scale(.98); }
.btn-desmarcar {
  background: var(--surface2); border: 1.5px solid var(--border);
  color: var(--muted); font-family: var(--r-head); font-size: .9rem;
  font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
  height: 44px; padding: 0 1rem; border-radius: 10px; width: 100%;
}
.btn-desmarcar:active { background: var(--border); }

/* ══════════════════════════════════════
   RESUMEN
══════════════════════════════════════ */
.rep-group { margin-bottom: 1.5rem; }
.rep-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: .7rem .9rem; background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 10px; margin-bottom: .5rem;
  box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.rep-name { font-family: var(--r-head); font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
.rep-progress { font-family: var(--r-mono); font-size: .82rem; color: var(--muted); }
.rep-progress .done { color: var(--green); font-weight: 600; }

/* ══════════════════════════════════════
   ASSIGN VIEW — MOBILE OPTIMIZED
══════════════════════════════════════ */
#assign-view { flex: 1; display: none; flex-direction: column; overflow: hidden; }
#assign-view.visible { display: flex; }

.assign-legend {
  display: flex; align-items: center; gap: 1.2rem;
  padding: .45rem 1rem; background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.legend-item { display: flex; align-items: center; gap: .35rem; font-size: .72rem; color: var(--muted); font-weight: 600; letter-spacing: .05em; text-transform: uppercase; }
.legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.legend-dot.albaran { background: var(--orange); }
.legend-dot.factura  { background: var(--teal); }

/* Pool — horizontal scroll */
.assign-pool-wrap { flex-shrink: 0; background: var(--bg); border-bottom: 2px solid var(--border); }
.assign-pool-title {
  font-family: var(--r-head); font-size: .75rem; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase; color: var(--muted);
  padding: .6rem 1rem .3rem;
}
.assign-pool-row {
  display: flex; gap: .6rem;
  padding: .4rem 1rem .75rem;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  min-height: 88px; scroll-snap-type: x mandatory;
}
.assign-pool-row::-webkit-scrollbar { display: none; }

/* Driver columns — horizontal scroll, each col ~80vw */
.assign-cols-scroll {
  flex: 1; display: flex; overflow-x: auto; overflow-y: hidden;
  -webkit-overflow-scrolling: touch; scroll-snap-type: x mandatory;
  scroll-padding: 0 1rem;
}
.assign-cols-scroll::-webkit-scrollbar { display: none; }

.assign-col {
  flex: 0 0 80vw; min-width: 260px; max-width: 340px;
  display: flex; flex-direction: column;
  border-right: 1px solid var(--border);
  scroll-snap-align: start;
}
.assign-col:last-child { border-right: none; flex: 0 0 calc(80vw + 1rem); }

.assign-col-header {
  padding: .7rem .75rem .5rem; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
  position: sticky; top: 0; z-index: 2;
}
.assign-col-name {
  font-family: var(--r-head); font-size: 1.1rem; font-weight: 900;
  text-transform: uppercase; letter-spacing: .06em; text-align: center;
}
.assign-col-count { font-family: var(--r-mono); font-size: .72rem; color: var(--muted); text-align: center; margin-top: .15rem; }

.assign-col:nth-child(1) .assign-col-name { color: var(--orange); }
.assign-col:nth-child(2) .assign-col-name { color: var(--blue); }
.assign-col:nth-child(3) .assign-col-name { color: var(--purple); }

.assign-col-body {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: .6rem .6rem calc(.6rem + var(--safe-b));
  background: var(--bg);
}
.assign-col-body.drag-over,
.assign-pool-row.drag-over {
  background: var(--orange-bg);
  outline: 2px dashed rgba(245,130,10,.5);
  outline-offset: -4px; border-radius: 8px;
}

/* CHIPS */
.assign-chip {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 10px; padding: .6rem .75rem;
  margin-bottom: .5rem; cursor: grab; user-select: none;
  -webkit-tap-highlight-color: transparent; touch-action: none;
  transition: box-shadow .15s, opacity .2s;
  box-shadow: 0 1px 3px rgba(0,0,0,.06);
  position: relative;
}
.assign-chip:active { cursor: grabbing; }
.assign-chip.dragging { opacity: .3; }
.assign-chip.drag-preview {
  position: fixed; z-index: 1000; pointer-events: none; opacity: .95;
  box-shadow: 0 12px 40px rgba(0,0,0,.2);
  transform: rotate(-1.5deg) scale(1.04); min-width: 180px;
}
.assign-pool-row .assign-chip { flex-shrink: 0; margin-bottom: 0; min-width: 170px; scroll-snap-align: start; }

.assign-chip.tipo-albaran { border-left: 3px solid var(--orange); }
.assign-chip.tipo-factura  { border-left: 3px solid var(--teal); }

.chip-top { display: flex; align-items: center; gap: .4rem; margin-bottom: .2rem; }
.chip-tipo {
  font-size: .6rem; font-weight: 700; letter-spacing: .07em;
  text-transform: uppercase; padding: .15rem .35rem; border-radius: 4px; flex-shrink: 0;
}
.chip-tipo.albaran { background: var(--orange-bg); color: var(--orange); }
.chip-tipo.factura  { background: var(--teal-bg);   color: var(--teal);   }
.chip-ref { font-family: var(--r-mono); font-size: .68rem; color: var(--muted); }
.chip-client { font-size: .88rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
.chip-bottom { display: flex; align-items: center; justify-content: space-between; margin-top: .2rem; }
.chip-lines { font-size: .72rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.chip-importe { font-family: var(--r-mono); font-size: .75rem; color: var(--teal); font-weight: 500; flex-shrink: 0; margin-left: .4rem; }

/* ── EMPTY / LOADING ── */
.empty-state { text-align: center; padding: 3rem 1rem; }
.empty-icon { font-size: 3.5rem; margin-bottom: 1rem; }
.empty-title { font-family: var(--r-head); font-size: 1.4rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; margin-bottom: .35rem; }
.empty-sub { color: var(--muted); font-size: .9rem; }
.loading-spinner { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem; gap: 1rem; }
.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--orange); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--muted); font-size: .9rem; }

/* ══════════════════════════════════════
   MODAL
══════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.35);
  display: none; align-items: flex-end; justify-content: center;
  z-index: 100; backdrop-filter: blur(3px);
}
.modal-overlay.open { display: flex; }
.modal-sheet {
  width: 100%; max-width: 480px;
  background: var(--surface); border-radius: 22px 22px 0 0;
  padding: 1.5rem 1.5rem calc(1.5rem + var(--safe-b));
  animation: slideUp .25s ease;
  box-shadow: 0 -8px 40px rgba(0,0,0,.12);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 40px; height: 4px; background: var(--muted2); border-radius: 2px; margin: 0 auto 1.5rem; }
.modal-title { font-family: var(--r-head); font-size: 1.5rem; font-weight: 900; text-transform: uppercase; letter-spacing: .04em; margin-bottom: .2rem; }
.modal-client { color: var(--muted); font-size: .9rem; margin-bottom: 1.5rem; }
.modal-label { font-size: .72rem; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: .5rem; }
.modal-group { margin-bottom: 1.1rem; }

.toggle-row {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 12px; padding: .9rem 1rem; min-height: var(--tap);
}
.toggle-label { font-weight: 500; font-size: 1rem; }
.toggle { position: relative; width: 50px; height: 28px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: var(--muted2); border-radius: 28px; transition: background .2s; cursor: pointer; }
.toggle-slider::before { content: ''; position: absolute; width: 22px; height: 22px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.2); }
.toggle input:checked + .toggle-slider { background: var(--orange); }
.toggle input:checked + .toggle-slider::before { transform: translateX(22px); }

.pago-options { display: grid; grid-template-columns: repeat(3,1fr); gap: .5rem; }
.pago-opt {
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 10px; padding: .7rem .4rem; text-align: center;
  font-size: .88rem; font-weight: 600; color: var(--muted);
  cursor: pointer; min-height: 48px;
  transition: border-color .15s, color .15s, background .15s;
  display: flex; align-items: center; justify-content: center;
}
.pago-opt.active { border-color: var(--orange); color: var(--orange); background: var(--orange-bg); }

.importe-input {
  width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 1.6rem;
  font-family: var(--r-mono); padding: .7rem 1rem; outline: none;
  height: 58px; transition: border-color .15s;
}
.importe-input:focus { border-color: var(--orange); background: #fff; }
.nota-input {
  width: 100%; background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: .95rem;
  padding: .75rem 1rem; outline: none; resize: none; height: 80px;
  transition: border-color .15s;
}
.nota-input:focus { border-color: var(--orange); background: #fff; }

.modal-actions { display: flex; gap: .6rem; margin-top: 1.5rem; }
.btn-cancel {
  flex: 0 0 auto; background: var(--surface2); border: 1.5px solid var(--border);
  color: var(--muted); font-family: var(--r-head); font-size: 1rem;
  font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
  padding: 0 1.25rem; height: var(--tap); border-radius: 10px;
}
.btn-cancel:active { background: var(--border); }
.btn-confirm {
  flex: 1; background: var(--green); color: #fff;
  font-family: var(--r-head); font-size: 1.1rem; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase;
  height: var(--tap); border-radius: 10px;
  transition: background .15s, transform .1s;
  box-shadow: 0 2px 10px rgba(22,163,74,.3);
}
.btn-confirm:active { background: var(--green-d); transform: scale(.98); }
.btn-confirm:disabled { background: var(--muted2); box-shadow: none; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: calc(1.5rem + var(--safe-b)); left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--text); color: #fff;
  border-radius: 100px; padding: .75rem 1.4rem;
  font-size: .875rem; font-weight: 500; white-space: nowrap;
  z-index: 200; transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
  opacity: 0; pointer-events: none;
  box-shadow: 0 4px 20px rgba(0,0,0,.2);
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.ok  { background: var(--green); }
.toast.err { background: var(--red); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-logo">
    <div class="logo-mark"></div>
    <div class="logo-name">Comercial<br><span>Puchol</span></div>
  </div>
  <div class="login-card">
    <div class="login-title">Acceso</div>
    <div class="login-sub">Introduce tus credenciales de Odoo</div>
    <div class="field">
      <label>Usuario</label>
      <input type="email" id="login-user" autocomplete="username" autocapitalize="off" autocorrect="off" inputmode="email" placeholder="usuario@comercialpuchol.es">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="login-pass" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button class="btn-primary" id="btn-login" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- REPARTIDOR -->
<div id="screen-driver" class="screen">
  <div class="app-header">
    <div class="header-left">
      <div class="header-logo"></div>
      <div>
        <div class="header-title">Mis Repartos</div>
        <div class="header-sub" id="driver-name">—</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()">Salir</button>
  </div>
  <div class="date-bar">
    <div class="date-text" id="driver-date">—</div>
    <button class="btn-refresh" onclick="loadDriverDeliveries()">↻ Actualizar</button>
  </div>
  <div class="scroll-area" id="driver-list">
    <div class="loading-spinner"><div class="spinner"></div><div class="loading-text">Cargando repartos…</div></div>
  </div>
</div>

<!-- OFICINA -->
<div id="screen-office" class="screen">
  <div class="app-header">
    <div class="header-left">
      <div class="header-logo"></div>
      <div>
        <div class="header-title">Oficina</div>
        <div class="header-sub" id="office-name">—</div>
      </div>
    </div>
    <button class="btn-logout" onclick="logout()">Salir</button>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('asignar')" id="tab-asignar">Asignar</button>
    <button class="tab-btn" onclick="switchTab('resumen')" id="tab-resumen">Resumen</button>
    <button class="tab-btn" onclick="switchTab('todos')" id="tab-todos">Todos</button>
  </div>
  <div class="date-bar">
    <div class="date-text" id="office-date">—</div>
    <button class="btn-refresh" onclick="refreshCurrentTab()">↻ Actualizar</button>
  </div>

  <!-- TAB ASIGNAR -->
  <div id="assign-view" class="visible">
    <div class="assign-legend">
      <div class="legend-item"><div class="legend-dot albaran"></div>Albarán</div>
      <div class="legend-item"><div class="legend-dot factura"></div>Factura</div>
      <div style="margin-left:auto;font-size:.7rem;color:var(--muted)">← desliza →</div>
    </div>
    <div class="assign-pool-wrap">
      <div class="assign-pool-title">Sin asignar</div>
      <div class="assign-pool-row" id="pool-row"
           ondragover="onDragOver(event)" ondrop="onDrop(event,'pool')" ondragleave="onDragLeave(event)">
      </div>
    </div>
    <div class="assign-cols-scroll" id="assign-columns"></div>
  </div>

  <!-- TAB RESUMEN / TODOS -->
  <div class="scroll-area" id="office-content" style="display:none">
    <div class="loading-spinner"><div class="spinner"></div><div class="loading-text">Cargando…</div></div>
  </div>
</div>

<!-- MODAL ENTREGAR -->
<div class="modal-overlay" id="modal-entregar">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Confirmar entrega</div>
    <div class="modal-client" id="modal-client-name">—</div>
    <div class="modal-group">
      <div class="toggle-row">
        <span class="toggle-label">¿Has cobrado?</span>
        <label class="toggle">
          <input type="checkbox" id="toggle-cobrado" onchange="onToggleCobrado()">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>
    <div id="cobro-fields" style="display:none">
      <div class="modal-group">
        <div class="modal-label">Forma de pago</div>
        <div class="pago-options">
          <div class="pago-opt active" onclick="selectPago('efectivo',this)">💵 Efectivo</div>
          <div class="pago-opt" onclick="selectPago('transferencia',this)">🏦 Transf.</div>
          <div class="pago-opt" onclick="selectPago('tarjeta',this)">💳 Tarjeta</div>
        </div>
      </div>
      <div class="modal-group">
        <div class="modal-label">Importe (€)</div>
        <input type="number" class="importe-input" id="modal-importe" placeholder="0.00" step="0.01" min="0" inputmode="decimal">
      </div>
    </div>
    <div class="modal-group">
      <div class="modal-label">Nota (opcional)</div>
      <textarea class="nota-input" id="modal-nota" placeholder="Incidencia, cliente ausente…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-confirm" id="btn-confirm" onclick="confirmarEntrega()">✓ Entregado</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://web-production-b097e.up.railway.app';

let state = {
  token:null, role:null, userName:'', userId:null,
  tab:'asignar', pickingId:null, formaPago:'efectivo',
  drivers:[], allPickings:[], resumenData:null,
  dragItem:null, preview:null,
};

async function apiFetch(path, options={}) {
  const headers = {'Content-Type':'application/json'};
  if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
  const res = await fetch(`${API}${path}`, {...options, headers:{...headers,...(options.headers||{})}});
  if (res.status===401) { logout(); throw new Error('Sesión expirada'); }
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || `Error ${res.status}`);
  return data;
}

// ── AUTH ──
async function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('btn-login');
  if (!user||!pass) { showLoginError('Introduce usuario y contraseña'); return; }
  btn.disabled=true; btn.textContent='Conectando…'; errEl.style.display='none';
  try {
    const data = await apiFetch('/auth/login', {method:'POST', body:JSON.stringify({username:user, password:pass})});
    state.token=data.token; state.role=data.role; state.userName=data.user_name; state.userId=data.user_id;
    sessionStorage.setItem('rp_token', state.token); sessionStorage.setItem('rp_role', state.role);
    sessionStorage.setItem('rp_user_name', state.userName); sessionStorage.setItem('rp_user_id', state.userId);
    enterApp();
  } catch(e) {
    showLoginError(e.message||'Error de conexión');
    btn.disabled=false; btn.textContent='Entrar';
  }
}
function showLoginError(msg) { const el=document.getElementById('login-error'); el.textContent=msg; el.style.display='block'; }
function logout() {
  sessionStorage.clear();
  state={token:null,role:null,userName:'',userId:null,tab:'asignar',pickingId:null,formaPago:'efectivo',drivers:[],allPickings:[],resumenData:null,dragItem:null,preview:null};
  const btn=document.getElementById('btn-login'); btn.disabled=false; btn.textContent='Entrar';
  document.getElementById('login-error').style.display='none';
  document.getElementById('login-user').value=''; document.getElementById('login-pass').value='';
  showScreen('login');
}
function enterApp() {
  if (state.role==='repartidor') {
    document.getElementById('driver-name').textContent=state.userName;
    showScreen('driver'); loadDriverDeliveries();
  } else {
    document.getElementById('office-name').textContent=state.userName;
    showScreen('office'); initOffice();
  }
}

// ── SCREENS ──
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const map={login:'screen-login',driver:'screen-driver',office:'screen-office'};
  document.getElementById(map[name]).classList.add('active');
}
function switchTab(tab) {
  state.tab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  const av=document.getElementById('assign-view');
  const ca=document.getElementById('office-content');
  if (tab==='asignar') {
    av.classList.add('visible'); av.style.display=''; ca.style.display='none'; loadAssignView();
  } else {
    av.classList.remove('visible'); av.style.display='none'; ca.style.display='';
    if (tab==='resumen') loadResumen(); else loadTodos();
  }
}
function refreshCurrentTab() {
  if (state.tab==='asignar') loadAssignView();
  else if (state.tab==='resumen') loadResumen();
  else loadTodos();
}

// ── OFFICE ──
async function initOffice() {
  try { const data=await apiFetch('/oficina/repartidores'); state.drivers=data.repartidores||[]; }
  catch(e) { state.drivers=[]; }
  loadAssignView();
}

async function loadAssignView() {
  const poolRow=document.getElementById('pool-row');
  const cols=document.getElementById('assign-columns');
  poolRow.innerHTML=`<div style="display:flex;align-items:center;gap:.5rem;padding:.25rem 0"><div class="spinner" style="width:20px;height:20px;border-width:2px"></div><span style="font-size:.8rem;color:var(--muted)">Cargando…</span></div>`;
  cols.innerHTML='';
  try {
    const data=await apiFetch('/oficina/asignacion');
    document.getElementById('office-date').textContent=formatDate(data.fecha);
    state.allPickings=data.pickings||[];
    buildAssignView();
  } catch(e) {
    poolRow.innerHTML=`<div style="padding:.5rem;color:var(--red);font-size:.85rem">${e.message}</div>`;
  }
}

function buildAssignView() {
  const drivers=state.drivers; const pickings=state.allPickings;
  const poolRow=document.getElementById('pool-row');
  const colsEl=document.getElementById('assign-columns');
  const unassigned=pickings.filter(p=>!p.repartidor_id);
  const assignedMap={};
  drivers.forEach(d=>{assignedMap[d.id]=[];});
  pickings.forEach(p=>{
    if (p.repartidor_id && assignedMap[p.repartidor_id]) assignedMap[p.repartidor_id].push(p);
    else if (p.repartidor_id) unassigned.push(p);
  });
  const poolSorted=[...unassigned].sort((a,b)=>a.tipo==='factura'?-1:b.tipo==='factura'?1:0);
  poolRow.innerHTML=poolSorted.length
    ? poolSorted.map(p=>chipHTML(p)).join('')
    : `<div style="padding:.5rem .2rem;font-size:.85rem;color:var(--green);font-weight:600">Todo asignado ✓</div>`;
  if (!drivers.length) {
    colsEl.innerHTML=`<div style="padding:2rem 1rem;color:var(--muted);font-size:.9rem;text-align:center">No se encontraron repartidores en Odoo.</div>`;
    attachDragEvents(); return;
  }
  colsEl.innerHTML=drivers.map((d)=>{
    const items=assignedMap[d.id]||[];
    const sorted=[...items].sort((a,b)=>a.tipo==='factura'?-1:b.tipo==='factura'?1:0);
    const chips=sorted.map(p=>chipHTML(p)).join('');
    const factCount=items.filter(i=>i.tipo==='factura').length;
    const albCount=items.filter(i=>i.tipo==='albaran').length;
    const countLabel=[albCount?`${albCount} alb.`:'',factCount?`${factCount} fact.`:''].filter(Boolean).join(' · ')||'0 docs';
    return `<div class="assign-col" id="col-${d.id}">
      <div class="assign-col-header">
        <div class="assign-col-name">${shortName(d.name)}</div>
        <div class="assign-col-count" id="count-${d.id}">${countLabel}</div>
      </div>
      <div class="assign-col-body" data-driver-id="${d.id}"
           ondragover="onDragOver(event)" ondrop="onDrop(event,${d.id})" ondragleave="onDragLeave(event)">
        ${chips||`<div style="height:48px;border:2px dashed var(--muted2);border-radius:10px;margin:.3rem;"></div>`}
      </div>
    </div>`;
  }).join('');
  attachDragEvents();
}

function chipHTML(p) {
  const linesText=(p.lineas||[]).slice(0,2).map(l=>`${l.cantidad}× ${l.producto}`).join(', ');
  const more=(p.lineas||[]).length>2?` +${p.lineas.length-2}`:'';
  const importeHTML=p.tipo==='factura'&&p.importe_total?`<span class="chip-importe">€${p.importe_total.toFixed(2)}</span>`:'';
  return `<div class="assign-chip tipo-${p.tipo}" id="chip-${p.tipo}-${p.id}" data-id="${p.id}" data-tipo="${p.tipo}" draggable="true">
    <div class="chip-top"><span class="chip-tipo ${p.tipo}">${p.tipo==='factura'?'FAC':'ALB'}</span><span class="chip-ref">${esc(p.nombre)}</span></div>
    <div class="chip-client">${esc(p.cliente)}</div>
    <div class="chip-bottom"><span class="chip-lines">${linesText?esc(linesText)+more:''}</span>${importeHTML}</div>
  </div>`;
}
function shortName(name) { return name.replace(/preventa/i,'PREV').replace(/repartidor/i,'REP'); }

// ── DRAG DESKTOP ──
function attachDragEvents() {
  document.querySelectorAll('.assign-chip').forEach(chip=>{
    chip.addEventListener('dragstart', onDragStart);
    chip.addEventListener('dragend', onDragEnd);
    chip.addEventListener('touchstart', onTouchStart, {passive:false});
    chip.addEventListener('touchmove', onTouchMove, {passive:false});
    chip.addEventListener('touchend', onTouchEnd);
  });
}
function onDragStart(e) {
  state.dragItem={id:parseInt(e.currentTarget.dataset.id), tipo:e.currentTarget.dataset.tipo};
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',`${state.dragItem.tipo}:${state.dragItem.id}`);
}
function onDragEnd(e) { e.currentTarget.classList.remove('dragging'); document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over')); }
function onDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect='move'; e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
async function onDrop(e, driverId) {
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  let item=state.dragItem;
  if (!item) { const [tipo,id]=e.dataTransfer.getData('text/plain').split(':'); item={tipo,id:parseInt(id)}; }
  if (!item?.id) return;
  await assignItem(item.id, item.tipo, driverId==='pool'?null:driverId);
}

// ── DRAG TOUCH ──
let touchChip=null, touchOffX=0, touchOffY=0;
function onTouchStart(e) {
  const chip=e.currentTarget; const touch=e.touches[0]; const rect=chip.getBoundingClientRect();
  touchOffX=touch.clientX-rect.left; touchOffY=touch.clientY-rect.top;
  state.dragItem={id:parseInt(chip.dataset.id), tipo:chip.dataset.tipo};
  const preview=chip.cloneNode(true);
  preview.classList.add('drag-preview');
  preview.style.width=rect.width+'px';
  preview.style.left=(touch.clientX-touchOffX)+'px';
  preview.style.top=(touch.clientY-touchOffY)+'px';
  document.body.appendChild(preview);
  state.preview=preview; chip.classList.add('dragging'); touchChip=chip;
}
function onTouchMove(e) {
  e.preventDefault(); const touch=e.touches[0];
  if (state.preview) { state.preview.style.left=(touch.clientX-touchOffX)+'px'; state.preview.style.top=(touch.clientY-touchOffY)+'px'; }
  document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
  const el=document.elementFromPoint(touch.clientX, touch.clientY);
  const zone=el?.closest('.assign-col-body,.assign-pool-row');
  if (zone) zone.classList.add('drag-over');
}
async function onTouchEnd(e) {
  const touch=e.changedTouches[0];
  if (state.preview) { state.preview.remove(); state.preview=null; }
  if (touchChip) { touchChip.classList.remove('dragging'); touchChip=null; }
  document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
  const el=document.elementFromPoint(touch.clientX, touch.clientY);
  const zone=el?.closest('.assign-col-body,.assign-pool-row');
  if (!zone||!state.dragItem) return;
  const driverId=zone.classList.contains('assign-pool-row')?null:parseInt(zone.dataset.driverId);
  await assignItem(state.dragItem.id, state.dragItem.tipo, isNaN(driverId)?null:driverId);
  state.dragItem=null;
}

async function assignItem(id, tipo, userId) {
  const item=state.allPickings.find(p=>p.id===id&&p.tipo===tipo);
  if (!item) return;
  item.repartidor_id=userId;
  item.repartidor=userId?state.drivers.find(d=>d.id===userId)?.name||'':null;
  buildAssignView();
  try {
    const endpoint=tipo==='factura'?`/facturas/${id}/asignar`:`/entregas/${id}/asignar`;
    await apiFetch(endpoint, {method:'POST', body:JSON.stringify({user_id:userId})});
    const driverName=userId?shortName(state.drivers.find(d=>d.id===userId)?.name||''):'sin asignar';
    showToast(`${item.nombre} → ${driverName}`, 'ok');
  } catch(e) { showToast(`Error: ${e.message}`, 'err'); await loadAssignView(); }
}

// ── RESUMEN ──
async function loadResumen() {
  const c=document.getElementById('office-content');
  c.innerHTML=`<div class="loading-spinner"><div class="spinner"></div><div class="loading-text">Cargando…</div></div>`;
  try {
    const data=await apiFetch('/oficina/resumen');
    document.getElementById('office-date').textContent=formatDate(data.fecha);
    let html=`<div class="stats-bar">
      <div class="stat-card"><div class="stat-num orange">${data.total}</div><div class="stat-label">Total</div></div>
      <div class="stat-card"><div class="stat-num green">${data.entregadas}</div><div class="stat-label">Entregados</div></div>
      <div class="stat-card"><div class="stat-num red">${data.pendientes}</div><div class="stat-label">Pendientes</div></div>
    </div>`;
    (data.repartidores||[]).forEach(rep=>{
      html+=`<div class="rep-group"><div class="rep-header">
        <div class="rep-name">${rep.repartidor}</div>
        <div class="rep-progress"><span class="done">${rep.entregadas}</span> / ${rep.total}${rep.total_cobrado?` · <span style="color:var(--teal)">€${rep.total_cobrado.toFixed(2)}</span>`:''}</div>
      </div>`;
      rep.entregas.forEach(e=>{html+=renderCard(e,'office');});
      html+=`</div>`;
    });
    if (!data.repartidores?.length) html+=`<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">Sin datos hoy</div></div>`;
    c.innerHTML=html;
  } catch(e) {
    c.innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Error</div><div class="empty-sub">${e.message}</div></div>`;
  }
}

async function loadTodos() {
  const c=document.getElementById('office-content');
  c.innerHTML=`<div class="loading-spinner"><div class="spinner"></div><div class="loading-text">Cargando…</div></div>`;
  try {
    const data=await apiFetch('/oficina/resumen');
    document.getElementById('office-date').textContent=formatDate(data.fecha);
    const all=(data.repartidores||[]).flatMap(r=>r.entregas);
    const pending=all.filter(e=>!e.entregado); const done=all.filter(e=>e.entregado);
    let html='';
    if (pending.length) { html+=`<div class="section-header"><div class="section-title">Pendientes</div><div class="section-count">${pending.length}</div></div>`; pending.forEach(e=>{html+=renderCard(e,'office');}); }
    if (done.length) { html+=`<div class="section-header" style="margin-top:1rem"><div class="section-title">Entregados</div><div class="section-count">${done.length}</div></div>`; done.forEach(e=>{html+=renderCard(e,'office');}); }
    if (!all.length) html=`<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">Sin entregas</div></div>`;
    c.innerHTML=html;
  } catch(e) {
    c.innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Error</div><div class="empty-sub">${e.message}</div></div>`;
  }
}

// ── DRIVER ──
async function loadDriverDeliveries() {
  const list=document.getElementById('driver-list');
  list.innerHTML=`<div class="loading-spinner"><div class="spinner"></div><div class="loading-text">Cargando repartos…</div></div>`;
  try {
    const data=await apiFetch('/entregas/hoy');
    document.getElementById('driver-date').textContent=formatDate(data.fecha);
    const entregas=data.entregas||[];
    const pending=entregas.filter(e=>!e.entregado); const done=entregas.filter(e=>e.entregado);
    if (!entregas.length) { list.innerHTML=`<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-title">Sin repartos hoy</div><div class="empty-sub">No tienes entregas asignadas</div></div>`; return; }
    let html=`<div class="stats-bar">
      <div class="stat-card"><div class="stat-num orange">${entregas.length}</div><div class="stat-label">Total</div></div>
      <div class="stat-card"><div class="stat-num green">${done.length}</div><div class="stat-label">Entregados</div></div>
      <div class="stat-card"><div class="stat-num red">${pending.length}</div><div class="stat-label">Pendientes</div></div>
    </div>`;
    if (pending.length) { html+=`<div class="section-header"><div class="section-title">Pendientes</div><div class="section-count">${pending.length}</div></div>`; pending.forEach(e=>{html+=renderCard(e,'driver');}); }
    if (done.length) { html+=`<div class="section-header" style="margin-top:1rem"><div class="section-title">Entregados</div><div class="section-count">${done.length}</div></div>`; done.forEach(e=>{html+=renderCard(e,'driver');}); }
    list.innerHTML=html;
  } catch(e) {
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Error</div><div class="empty-sub">${e.message}</div></div>`;
  }
}

// ── CARD ──
function renderCard(e, ctx) {
  const isDone=e.entregado;
  const lineas=(e.lineas||[]).map(l=>`<div class="card-line"><span>${esc(l.producto)}</span><span class="line-qty">${l.cantidad} ud.</span></div>`).join('');
  const notaHtml=e.nota?`<div class="card-note">📌 ${esc(e.nota)}</div>`:'';
  const notaRepHtml=e.nota_repartidor?`<div class="card-note" style="background:var(--blue-bg);border-left-color:var(--blue)">💬 ${esc(e.nota_repartidor)}</div>`:'';
  const repBadge=ctx==='office'&&e.repartidor?`<span class="badge" style="background:var(--blue-bg);color:var(--blue);border:1px solid rgba(37,99,235,.15)">${esc(e.repartidor)}</span>`:'';
  const tipoBadge=e.tipo==='factura'?`<span class="badge badge-fac">FAC</span>`:`<span class="badge badge-alb">ALB</span>`;
  const actionHtml=isDone
    ?(ctx==='office'?`<button class="btn-desmarcar" onclick="desmarcarEntrega(${e.id},event)">Desmarcar</button>`:'')
    :`<button class="btn-entregar" onclick="openModal(${e.id},'${esc(e.cliente)}',event,${e.importe||0})">Marcar entregado</button>`;
  const badges=[
    tipoBadge,
    isDone?`<span class="badge badge-done">✓ Entregado</span>`:`<span class="badge badge-pending">Pendiente</span>`,
    e.cobrado?`<span class="badge badge-cobrado">Cobrado</span>`:'',
    repBadge,
  ].join('');
  return `<div class="delivery-card ${isDone?'entregado':''}" id="card-${e.id}">
    <div class="card-header" onclick="toggleCard(${e.id})">
      <div class="card-status ${isDone?'done':'pending'}">${isDone?'✓':'→'}</div>
      <div class="card-info">
        <div class="card-client">${esc(e.cliente)}</div>
        <div class="card-meta"><span class="card-ref">${e.nombre}</span>${badges}</div>
      </div>
      <div class="card-arrow">›</div>
    </div>
    <div class="card-body">
      ${notaHtml}${notaRepHtml}
      ${lineas?`<div class="card-lines">${lineas}</div>`:''}
      ${actionHtml?`<div class="card-actions">${actionHtml}</div>`:''}
    </div>
  </div>`;
}
function toggleCard(id) { document.getElementById(`card-${id}`)?.classList.toggle('open'); }

// ── MODAL ──
function openModal(pickingId, clientName, ev, importe) {
  if (ev) ev.stopPropagation();
  state.pickingId=pickingId; state.formaPago='efectivo';
  document.getElementById('modal-client-name').textContent=clientName;
  document.getElementById('modal-nota').value='';
  document.querySelectorAll('.pago-opt').forEach(o=>o.classList.remove('active'));
  document.querySelector('.pago-opt').classList.add('active');
  document.getElementById('toggle-cobrado').checked=false;
  document.getElementById('cobro-fields').style.display='none';
  document.getElementById('modal-importe').value=importe&&importe>0?parseFloat(importe).toFixed(2):'';
  document.getElementById('modal-entregar').classList.add('open');
}
function closeModal() { document.getElementById('modal-entregar').classList.remove('open'); }
function onToggleCobrado() { document.getElementById('cobro-fields').style.display=document.getElementById('toggle-cobrado').checked?'block':'none'; }
function selectPago(tipo, el) { state.formaPago=tipo; document.querySelectorAll('.pago-opt').forEach(o=>o.classList.remove('active')); el.classList.add('active'); }
async function confirmarEntrega() {
  const btn=document.getElementById('btn-confirm');
  const cobrado=document.getElementById('toggle-cobrado').checked;
  const importe=parseFloat(document.getElementById('modal-importe').value)||0;
  const nota=document.getElementById('modal-nota').value.trim();
  btn.disabled=true; btn.textContent='Guardando…';
  try {
    await apiFetch(`/entregas/${state.pickingId}/entregar`, {method:'POST', body:JSON.stringify({cobrado, importe:cobrado?importe:null, forma_pago:cobrado?state.formaPago:null, nota:nota||null})});
    closeModal(); showToast('Entrega confirmada ✓','ok');
    if (state.role==='repartidor') loadDriverDeliveries(); else refreshCurrentTab();
  } catch(e) { showToast(e.message,'err'); }
  finally { btn.disabled=false; btn.textContent='✓ Entregado'; }
}
async function desmarcarEntrega(id, ev) {
  if (ev) ev.stopPropagation();
  if (!confirm('¿Desmarcar esta entrega?')) return;
  try { await apiFetch(`/entregas/${id}/desmarcar`,{method:'POST'}); showToast('Entrega desmarcada','ok'); refreshCurrentTab(); }
  catch(e) { showToast(e.message,'err'); }
}

// ── UTILS ──
function formatDate(iso) { if(!iso)return''; const d=new Date(iso+'T00:00:00'); return d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'}); }
function esc(s) { return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
let toastTimer;
function showToast(msg, type='ok') { const t=document.getElementById('toast'); t.textContent=msg; t.className=`toast ${type} show`; clearTimeout(toastTimer); toastTimer=setTimeout(()=>{t.className='toast';},2800); }

document.getElementById('modal-entregar').addEventListener('click', function(e) { if(e.target===this)closeModal(); });
document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter')doLogin(); });

(function restoreSession() {
  const token=sessionStorage.getItem('rp_token'); const role=sessionStorage.getItem('rp_role');
  if (token&&role) { state.token=token; state.role=role; state.userName=sessionStorage.getItem('rp_user_name'); state.userId=parseInt(sessionStorage.getItem('rp_user_id')); enterApp(); }
})();
</script>
