<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Repartos · Comercial Puchol</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f1117;--surface:#181b24;--surface2:#1e2232;--border:#2a2f42;
  --orange:#f5820a;--orange-d:#c4670a;--orange-l:#ff9d2e;
  --green:#1ec86e;--green-d:#0f9950;--red:#e03a3a;--blue:#3a8ef5;--purple:#a855f7;
  --teal:#0ecfcf;  /* color facturas */
  --text:#eef0f7;--muted:#6b728e;--muted2:#3d4260;
  --r-head:'Barlow Condensed',sans-serif;--r-body:'Barlow',sans-serif;--r-mono:'DM Mono',monospace;
  --radius:12px;--safe-b:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--r-body);font-size:16px;-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
button{cursor:pointer;border:none;background:none;font-family:inherit;}
input,textarea{font-family:inherit;}

.screen{display:none;flex-direction:column;height:100dvh;overflow:hidden;}
.screen.active{display:flex;}

/* LOGIN */
#screen-login{justify-content:center;align-items:center;padding:2rem;
  background:radial-gradient(ellipse 70% 50% at 80% 10%,rgba(245,130,10,.12) 0%,transparent 60%),var(--bg);}
.login-logo{display:flex;align-items:center;gap:14px;margin-bottom:3rem;}
.logo-mark{width:48px;height:48px;background:var(--orange);clip-path:polygon(0 0,68% 0,100% 32%,100% 100%,32% 100%,0 68%);flex-shrink:0;}
.logo-name{font-family:var(--r-head);font-size:1.6rem;font-weight:900;letter-spacing:.04em;text-transform:uppercase;line-height:1;}
.logo-name span{color:var(--orange);}
.login-card{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;}
.login-title{font-family:var(--r-head);font-size:2rem;font-weight:900;text-transform:uppercase;letter-spacing:.02em;margin-bottom:.3rem;}
.login-sub{color:var(--muted);font-size:.9rem;margin-bottom:2rem;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:.75rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;}
.field input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:1rem;padding:.75rem 1rem;outline:none;transition:border-color .15s;}
.field input:focus{border-color:var(--orange);}
.btn-primary{width:100%;background:var(--orange);color:#000;font-family:var(--r-head);font-size:1.1rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:.85rem;border-radius:8px;margin-top:.5rem;transition:background .15s,transform .1s;}
.btn-primary:active{background:var(--orange-d);transform:scale(.98);}
.btn-primary:disabled{background:var(--muted2);color:var(--muted);}
.login-error{display:none;background:rgba(224,58,58,.12);border:1px solid rgba(224,58,58,.3);border-radius:8px;color:#ff7070;font-size:.875rem;padding:.65rem .9rem;margin-top:1rem;}

/* HEADER */
.app-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.header-left{display:flex;align-items:center;gap:10px;}
.header-logo{width:30px;height:30px;background:var(--orange);clip-path:polygon(0 0,68% 0,100% 32%,100% 100%,32% 100%,0 68%);flex-shrink:0;}
.header-title{font-family:var(--r-head);font-size:1.2rem;font-weight:900;text-transform:uppercase;letter-spacing:.04em;}
.header-sub{font-size:.75rem;color:var(--muted);}
.btn-logout{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:.75rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:.4rem .7rem;}

/* TABS */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.tab-btn{flex:1;padding:.7rem;font-family:var(--r-head);font-size:.9rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);border-bottom:3px solid transparent;transition:color .15s,border-color .15s;}
.tab-btn.active{color:var(--orange);border-bottom-color:var(--orange);}

/* DATE BAR */
.date-bar{display:flex;align-items:center;justify-content:space-between;padding:.65rem 1rem;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.date-text{font-family:var(--r-mono);font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.btn-refresh{display:flex;align-items:center;gap:.4rem;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:.75rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:.35rem .6rem;}
.btn-refresh:active{color:var(--orange);}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:1rem 1rem calc(1rem + var(--safe-b));}

/* STATS */
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;margin-bottom:1rem;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem;text-align:center;}
.stat-num{font-family:var(--r-mono);font-size:1.6rem;font-weight:500;line-height:1;}
.stat-num.orange{color:var(--orange);}.stat-num.green{color:var(--green);}.stat-num.red{color:var(--red);}
.stat-label{font-size:.7rem;color:var(--muted);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-top:.2rem;}

/* DELIVERY CARD */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem;}
.section-title{font-family:var(--r-head);font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
.section-count{font-family:var(--r-mono);font-size:.75rem;color:var(--muted);}
.delivery-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:.6rem;overflow:hidden;transition:border-color .2s;}
.delivery-card.entregado{border-color:rgba(30,200,110,.25);opacity:.8;}
.delivery-card.entregado .card-header{background:rgba(30,200,110,.06);}
.card-header{display:flex;align-items:center;gap:.75rem;padding:.9rem 1rem;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;}
.card-status{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.1rem;}
.card-status.pending{background:rgba(245,130,10,.15);}.card-status.done{background:rgba(30,200,110,.15);}
.card-info{flex:1;min-width:0;}
.card-client{font-weight:600;font-size:.975rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-meta{display:flex;gap:.5rem;margin-top:.2rem;align-items:center;flex-wrap:wrap;}
.card-ref{font-family:var(--r-mono);font-size:.72rem;color:var(--muted);}
.badge{font-size:.65rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:.15rem .4rem;border-radius:4px;}
.badge-done{background:rgba(30,200,110,.15);color:var(--green);}
.badge-pending{background:rgba(245,130,10,.12);color:var(--orange-l);}
.badge-cobrado{background:rgba(58,142,245,.12);color:var(--blue);}
.badge-alb{background:rgba(245,130,10,.15);color:var(--orange);font-size:.6rem;}
.badge-fac{background:rgba(14,207,207,.15);color:var(--teal);font-size:.6rem;}
.card-arrow{color:var(--muted2);font-size:.9rem;transition:transform .2s;flex-shrink:0;}
.delivery-card.open .card-arrow{transform:rotate(90deg);}
.card-body{display:none;padding:0 1rem 1rem;border-top:1px solid var(--border);}
.delivery-card.open .card-body{display:block;}
.card-lines{margin-bottom:.9rem;}
.card-line{display:flex;justify-content:space-between;align-items:center;padding:.4rem 0;border-bottom:1px solid var(--border);font-size:.875rem;}
.card-line:last-child{border-bottom:none;}
.line-qty{font-family:var(--r-mono);font-size:.8rem;color:var(--orange);font-weight:500;flex-shrink:0;margin-left:.5rem;}
.card-note{font-size:.8rem;color:var(--muted);font-style:italic;margin-bottom:.9rem;padding:.5rem .7rem;background:var(--surface2);border-radius:6px;border-left:3px solid var(--orange);}
.card-actions{display:flex;gap:.5rem;}
.btn-entregar{flex:1;background:var(--orange);color:#000;font-family:var(--r-head);font-size:1rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:.7rem;border-radius:8px;transition:background .15s,transform .1s;}
.btn-entregar:active{background:var(--orange-d);transform:scale(.97);}
.btn-desmarcar{background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:var(--r-head);font-size:.85rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:.7rem 1rem;border-radius:8px;}

/* RESUMEN */
.rep-group{margin-bottom:1.5rem;}
.rep-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;padding:.5rem .75rem;background:var(--surface2);border-radius:8px;}
.rep-name{font-family:var(--r-head);font-size:1.1rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.rep-progress{font-family:var(--r-mono);font-size:.85rem;color:var(--muted);}
.rep-progress .done{color:var(--green);}

/* ══════════════════════════════════════
   ASSIGN VIEW — DRAG & DROP
══════════════════════════════════════ */
#assign-view{flex:1;display:none;flex-direction:column;overflow:hidden;}
#assign-view.visible{display:flex;}

/* Legend */
.assign-legend{
  display:flex;align-items:center;gap:1rem;
  padding:.45rem 1rem;background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.legend-item{display:flex;align-items:center;gap:.35rem;font-size:.72rem;color:var(--muted);font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.legend-dot.albaran{background:var(--orange);}
.legend-dot.factura{background:var(--teal);}

/* Pool */
.assign-pool-wrap{flex-shrink:0;border-bottom:1px solid var(--border);background:var(--bg);}
.assign-pool-title{font-family:var(--r-head);font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:.5rem 1rem .3rem;}
.assign-pool-row{display:flex;gap:.5rem;padding:.5rem 1rem .6rem;overflow-x:auto;-webkit-overflow-scrolling:touch;min-height:80px;}
.assign-pool-row::-webkit-scrollbar{display:none;}

/* Columns */
.assign-columns{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:0;overflow:hidden;}
.assign-col{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.assign-col:last-child{border-right:none;}
.assign-col-header{padding:.6rem .5rem .4rem;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.assign-col-name{font-family:var(--r-head);font-size:.95rem;font-weight:900;text-transform:uppercase;letter-spacing:.04em;text-align:center;}
.assign-col-count{font-family:var(--r-mono);font-size:.68rem;color:var(--muted);text-align:center;margin-top:.1rem;}
.assign-col-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:.4rem .4rem calc(.5rem + var(--safe-b));min-height:60px;}
.assign-col-body.drag-over,.assign-pool-row.drag-over{background:rgba(245,130,10,.07);outline:2px dashed rgba(245,130,10,.4);outline-offset:-4px;border-radius:8px;}

/* Color accents per column */
.assign-col:nth-child(1) .assign-col-name{color:var(--orange);}
.assign-col:nth-child(2) .assign-col-name{color:var(--blue);}
.assign-col:nth-child(3) .assign-col-name{color:var(--purple);}

/* CHIPS */
.assign-chip{
  background:var(--surface);border:1.5px solid var(--border);border-radius:8px;
  padding:.45rem .6rem;margin-bottom:.4rem;
  cursor:grab;user-select:none;-webkit-tap-highlight-color:transparent;touch-action:none;
  transition:box-shadow .15s,opacity .2s,border-color .2s;position:relative;
}
/* Left accent by tipo */
.assign-chip.tipo-albaran{border-left:3px solid var(--orange);}
.assign-chip.tipo-factura{border-left:3px solid var(--teal);}
/* Inside a column, use column color instead of tipo color */
.assign-col:nth-child(1) .assign-chip.tipo-albaran{border-left-color:var(--orange);}
.assign-col:nth-child(1) .assign-chip.tipo-factura{border-left-color:var(--teal);}
.assign-col:nth-child(2) .assign-chip{border-left-color:var(--blue);}
.assign-col:nth-child(2) .assign-chip.tipo-factura{border-left-color:var(--teal);}
.assign-col:nth-child(3) .assign-chip{border-left-color:var(--purple);}
.assign-col:nth-child(3) .assign-chip.tipo-factura{border-left-color:var(--teal);}

.assign-chip:active{cursor:grabbing;}
.assign-chip.dragging{opacity:.3;box-shadow:none;}
.assign-chip.drag-preview{
  position:fixed;z-index:1000;pointer-events:none;opacity:.95;
  box-shadow:0 12px 40px rgba(0,0,0,.6);transform:rotate(-1.5deg) scale(1.04);min-width:140px;
}
.assign-pool-row .assign-chip{flex-shrink:0;margin-bottom:0;min-width:140px;}

.chip-top{display:flex;align-items:center;gap:.4rem;margin-bottom:.15rem;}
.chip-tipo{font-size:.6rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:.1rem .3rem;border-radius:3px;flex-shrink:0;}
.chip-tipo.albaran{background:rgba(245,130,10,.15);color:var(--orange);}
.chip-tipo.factura{background:rgba(14,207,207,.15);color:var(--teal);}
.chip-ref{font-family:var(--r-mono);font-size:.68rem;color:var(--muted);font-weight:500;}
.chip-client{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;}
.chip-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:.2rem;}
.chip-lines{font-size:.7rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.chip-importe{font-family:var(--r-mono);font-size:.72rem;color:var(--teal);font-weight:500;flex-shrink:0;margin-left:.4rem;}

/* EMPTY / LOADING */
.empty-state{text-align:center;padding:3rem 1rem;}
.empty-icon{font-size:3rem;margin-bottom:1rem;}
.empty-title{font-family:var(--r-head);font-size:1.3rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.3rem;}
.empty-sub{color:var(--muted);font-size:.9rem;}
.loading-spinner{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem;gap:1rem;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{color:var(--muted);font-size:.875rem;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal-sheet{width:100%;max-width:480px;background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:1.5rem 1.5rem calc(1.5rem + var(--safe-b));animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 1.5rem;}
.modal-title{font-family:var(--r-head);font-size:1.5rem;font-weight:900;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.25rem;}
.modal-client{color:var(--muted);font-size:.9rem;margin-bottom:1.5rem;}
.modal-label{font-size:.75rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem;}
.modal-group{margin-bottom:1.1rem;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;}
.toggle-label{font-weight:500;}
.toggle{position:relative;width:48px;height:26px;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:26px;transition:background .2s;cursor:pointer;}
.toggle-slider::before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s;}
.toggle input:checked+.toggle-slider{background:var(--orange);}
.toggle input:checked+.toggle-slider::before{transform:translateX(22px);}
.pago-options{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;}
.pago-opt{background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:.6rem .4rem;text-align:center;font-size:.85rem;font-weight:600;color:var(--muted);cursor:pointer;transition:border-color .15s,color .15s,background .15s;}
.pago-opt.active{border-color:var(--orange);color:var(--orange);background:rgba(245,130,10,.08);}
.importe-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:1.5rem;font-family:var(--r-mono);padding:.65rem 1rem;outline:none;transition:border-color .15s;}
.importe-input:focus{border-color:var(--orange);}
.nota-input{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:.95rem;padding:.65rem 1rem;outline:none;resize:none;height:72px;transition:border-color .15s;}
.nota-input:focus{border-color:var(--orange);}
.modal-actions{display:flex;gap:.5rem;margin-top:1.5rem;}
.btn-cancel{flex:0 0 auto;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:var(--r-head);font-size:1rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:.8rem 1.2rem;border-radius:8px;}
.btn-confirm{flex:1;background:var(--green);color:#000;font-family:var(--r-head);font-size:1.1rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:.8rem;border-radius:8px;transition:background .15s,transform .1s;}
.btn-confirm:active{background:var(--green-d);transform:scale(.98);}
.btn-confirm:disabled{background:var(--muted2);color:var(--muted);}

/* TOAST */
.toast{position:fixed;bottom:calc(1.5rem + var(--safe-b));left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:.7rem 1.2rem;font-size:.875rem;font-weight:500;white-space:nowrap;z-index:200;transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.toast.ok{border-color:rgba(30,200,110,.4);color:var(--green);}
.toast.err{border-color:rgba(224,58,58,.4);color:#ff7070;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="screen-login" class="screen active">
  <div class="login-logo">
    <div class="logo-mark"></div>
    <div class="logo-name">Comercial<br><span>Puchol</span></div>
  </div>
  <div class="login-card">
    <div class="login-title">Acceso</div>
    <div class="login-sub">Introduce tus credenciales de Odoo</div>
    <div class="field"><label>Usuario</label>
      <input type="text" id="login-user" autocomplete="username" autocapitalize="off" placeholder="usuario@comercialpuchol.com"></div>
    <div class="field"><label>Contraseña</label>
      <input type="password" id="login-pass" autocomplete="current-password" placeholder="••••••••"></div>
    <button class="btn-primary" id="btn-login" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- REPARTIDOR -->
<div id="screen-driver" class="screen">
  <div class="app-header">
    <div class="header-left">
      <div class="header-logo"></div>
      <div><div class="header-title">Mis Repartos</div>
        <div class="header-sub" id="driver-name">—</div></div>
    </div>
    <button class="btn-logout" onclick="logout()">Salir</button>
  </div>
  <div class="date-bar">
    <div class="date-text" id="driver-date">—</div>
    <button class="btn-refresh" onclick="loadDriverDeliveries()">↻ Actualizar</button>
  </div>
  <div class="scroll-area" id="driver-list">
    <div class="loading-spinner"><div class="spinner"></div><div class="loading-text">Cargando…</div></div>
  </div>
</div>

<!-- OFICINA -->
<div id="screen-office" class="screen">
  <div class="app-header">
    <div class="header-left">
      <div class="header-logo"></div>
      <div><div class="header-title">Oficina</div>
        <div class="header-sub" id="office-name">—</div></div>
    </div>
    <button class="btn-logout" onclick="logout()">Salir</button>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('asignar')" id="tab-asignar">Asignar</button>
    <button class="tab-btn" onclick="switchTab('resumen')" id="tab-resumen">Resumen</button>
    <button class="tab-btn" onclick="switchTab('todos')" id="tab-todos">Todos</button>
  </div>
  <div class="date-bar">
    <div class="date-text" id="office-date">—</div>
    <button class="btn-refresh" onclick="refreshCurrentTab()">↻ Actualizar</button>
  </div>

  <!-- TAB ASIGNAR -->
  <div id="assign-view" class="visible">
    <div class="assign-legend">
      <div class="legend-item"><div class="legend-dot albaran"></div>Albarán</div>
      <div class="legend-item"><div class="legend-dot factura"></div>Factura</div>
    </div>
    <div class="assign-pool-wrap">
      <div class="assign-pool-title">Sin asignar — arrastra a un repartidor</div>
      <div class="assign-pool-row" id="pool-row"
           ondragover="onDragOver(event)" ondrop="onDrop(event,'pool')" ondragleave="onDragLeave(event)">
      </div>
    </div>
    <div class="assign-columns" id="assign-columns"></div>
  </div>

  <!-- TAB RESUMEN / TODOS -->
  <div class="scroll-area" id="office-content" style="display:none">
    <div class="loading-spinner"><div class="spinner"></div><div class="loading-text">Cargando…</div></div>
  </div>
</div>

<!-- MODAL ENTREGAR -->
<div class="modal-overlay" id="modal-entregar">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Confirmar entrega</div>
    <div class="modal-client" id="modal-client-name">—</div>
    <div class="modal-group">
      <div class="toggle-row">
        <span class="toggle-label">¿Has cobrado?</span>
        <label class="toggle">
          <input type="checkbox" id="toggle-cobrado" onchange="onToggleCobrado()">
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>
    <div id="cobro-fields" style="display:none">
      <div class="modal-group">
        <div class="modal-label">Forma de pago</div>
        <div class="pago-options">
          <div class="pago-opt active" onclick="selectPago('efectivo',this)">💵 Efectivo</div>
          <div class="pago-opt" onclick="selectPago('transferencia',this)">🏦 Transf.</div>
          <div class="pago-opt" onclick="selectPago('tarjeta',this)">💳 Tarjeta</div>
        </div>
      </div>
      <div class="modal-group">
        <div class="modal-label">Importe (€)</div>
        <input type="number" class="importe-input" id="modal-importe" placeholder="0.00" step="0.01" min="0">
      </div>
    </div>
    <div class="modal-group">
      <div class="modal-label">Nota (opcional)</div>
      <textarea class="nota-input" id="modal-nota" placeholder="Incidencia, cliente ausente…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-confirm" id="btn-confirm" onclick="confirmarEntrega()">✓ Entregado</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://web-production-b097e.up.railway.app'; // ← cambia esto

let state = {
  token:null, role:null, userName:'', userId:null,
  tab:'asignar',
  pickingId:null, formaPago:'efectivo',
  drivers:[], allPickings:[],
  resumenData:null,
  dragItem:null,  // {id, tipo}
  preview:null,
};

// ── API ──────────────────────────────────────────
async function apiFetch(path, options={}) {
  const headers = {'Content-Type':'application/json'};
  if (state.token) headers['Authorization'] = `Bearer ${state.token}`;
  const res = await fetch(`${API}${path}`, {...options, headers:{...headers,...(options.headers||{})}});
  if (res.status===401) { logout(); throw new Error('Sesión expirada'); }
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || `Error ${res.status}`);
  return data;
}

// ── AUTH ─────────────────────────────────────────
async function doLogin() {
  const user=document.getElementById('login-user').value.trim();
  const pass=document.getElementById('login-pass').value;
  const errEl=document.getElementById('login-error');
  const btn=document.getElementById('btn-login');
  if (!user||!pass){showLoginError('Introduce usuario y contraseña');return;}
  btn.disabled=true; btn.textContent='Conectando…'; errEl.style.display='none';
  try {
    const data=await apiFetch('/auth/login',{method:'POST',body:JSON.stringify({username:user,password:pass})});
    state.token=data.token; state.role=data.role; state.userName=data.user_name; state.userId=data.user_id;
    sessionStorage.setItem('rp_token',state.token); sessionStorage.setItem('rp_role',state.role);
    sessionStorage.setItem('rp_user_name',state.userName); sessionStorage.setItem('rp_user_id',state.userId);
    enterApp();
  } catch(e) {
    showLoginError(e.message||'Error de conexión'); btn.disabled=false; btn.textContent='Entrar';
  }
}
function showLoginError(msg){const el=document.getElementById('login-error');el.textContent=msg;el.style.display='block';}
function logout(){
  sessionStorage.clear();
  state={token:null,role:null,userName:'',userId:null,tab:'asignar',
    pickingId:null,formaPago:'efectivo',drivers:[],allPickings:[],resumenData:null,dragItem:null,preview:null};
  showScreen('login');
}
function enterApp(){
  if (state.role==='repartidor'){
    document.getElementById('driver-name').textContent=state.userName;
    showScreen('driver'); loadDriverDeliveries();
  } else {
    document.getElementById('office-name').textContent=state.userName;
    showScreen('office'); initOffice();
  }
}

// ── SCREENS / TABS ───────────────────────────────
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const map={login:'screen-login',driver:'screen-driver',office:'screen-office'};
  document.getElementById(map[name]).classList.add('active');
}
function switchTab(tab){
  state.tab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  const av=document.getElementById('assign-view');
  const ca=document.getElementById('office-content');
  if (tab==='asignar'){
    av.classList.add('visible'); av.style.display=''; ca.style.display='none'; loadAssignView();
  } else {
    av.classList.remove('visible'); av.style.display='none'; ca.style.display='';
    if (tab==='resumen') loadResumen(); else loadTodos();
  }
}
function refreshCurrentTab(){
  if (state.tab==='asignar') loadAssignView();
  else if (state.tab==='resumen') loadResumen();
  else loadTodos();
}

// ── OFFICE INIT ──────────────────────────────────
async function initOffice(){
  try {
    const data=await apiFetch('/oficina/repartidores');
    state.drivers=data.repartidores||[];
  } catch(e){ state.drivers=[]; }
  loadAssignView();
}

// ── ASSIGN VIEW ──────────────────────────────────
async function loadAssignView(){
  const poolRow=document.getElementById('pool-row');
  const cols=document.getElementById('assign-columns');
  poolRow.innerHTML=`<div style="display:flex;align-items:center;gap:.5rem;padding:.5rem"><div class="spinner" style="width:20px;height:20px;border-width:2px"></div><span style="font-size:.8rem;color:var(--muted)">Cargando…</span></div>`;
  cols.innerHTML='';
  try {
    const assignData=await apiFetch('/oficina/asignacion');
    document.getElementById('office-date').textContent=formatDate(assignData.fecha);
    state.allPickings=assignData.pickings||[];
    buildAssignView();
  } catch(e){
    poolRow.innerHTML=`<div style="padding:.5rem;color:#ff7070;font-size:.85rem">${e.message}</div>`;
  }
}

function buildAssignView(){
  const drivers=state.drivers;
  const pickings=state.allPickings;
  const poolRow=document.getElementById('pool-row');
  const colsEl=document.getElementById('assign-columns');

  const unassigned=pickings.filter(p=>!p.repartidor_id);
  const assignedMap={};
  drivers.forEach(d=>{assignedMap[d.id]=[];});
  pickings.forEach(p=>{
    if (p.repartidor_id && assignedMap[p.repartidor_id]) assignedMap[p.repartidor_id].push(p);
    else if (p.repartidor_id) unassigned.push(p);
  });

  // Pool — sort: facturas primero, luego albaranes
  const poolSorted=[...unassigned].sort((a,b)=>a.tipo==='factura'?-1:b.tipo==='factura'?1:0);
  poolRow.innerHTML=poolSorted.length
    ? poolSorted.map(p=>chipHTML(p)).join('')
    : `<div style="padding:.5rem .2rem;font-size:.8rem;color:var(--muted)">Todo asignado ✓</div>`;

  if (!drivers.length){
    colsEl.innerHTML=`<div style="padding:2rem;color:var(--muted);font-size:.9rem;text-align:center;grid-column:1/-1">No se encontraron repartidores en Odoo.</div>`;
    attachDragEvents(); return;
  }

  colsEl.innerHTML=drivers.map((d)=>{
    const items=assignedMap[d.id]||[];
    // facturas primero dentro de cada columna
    const sorted=[...items].sort((a,b)=>a.tipo==='factura'?-1:b.tipo==='factura'?1:0);
    const chips=sorted.map(p=>chipHTML(p)).join('');
    const factCount=items.filter(i=>i.tipo==='factura').length;
    const albCount=items.filter(i=>i.tipo==='albaran').length;
    const countLabel=[
      albCount?`${albCount} alb.`:'',
      factCount?`${factCount} fact.`:'',
    ].filter(Boolean).join(' · ') || '0 docs';
    return `<div class="assign-col" id="col-${d.id}">
      <div class="assign-col-header">
        <div class="assign-col-name">${shortName(d.name)}</div>
        <div class="assign-col-count" id="count-${d.id}">${countLabel}</div>
      </div>
      <div class="assign-col-body" data-driver-id="${d.id}"
           ondragover="onDragOver(event)" ondrop="onDrop(event,${d.id})" ondragleave="onDragLeave(event)">
        ${chips||`<div style="height:40px;border:2px dashed var(--muted2);border-radius:8px;margin:.3rem;"></div>`}
      </div>
    </div>`;
  }).join('');

  attachDragEvents();
}

function chipHTML(p){
  const linesText=(p.lineas||[]).slice(0,2).map(l=>`${l.cantidad}× ${l.producto}`).join(', ');
  const more=(p.lineas||[]).length>2?` +${p.lineas.length-2}`:'';
  const importeHTML=p.tipo==='factura'&&p.importe_total
    ?`<span class="chip-importe">€${p.importe_total.toFixed(2)}</span>`:'';
  return `<div class="assign-chip tipo-${p.tipo}"
    id="chip-${p.tipo}-${p.id}"
    data-id="${p.id}"
    data-tipo="${p.tipo}"
    draggable="true">
    <div class="chip-top">
      <span class="chip-tipo ${p.tipo}">${p.tipo==='factura'?'FAC':'ALB'}</span>
      <span class="chip-ref">${esc(p.nombre)}</span>
    </div>
    <div class="chip-client">${esc(p.cliente)}</div>
    <div class="chip-bottom">
      <span class="chip-lines">${linesText?esc(linesText)+more:''}</span>
      ${importeHTML}
    </div>
  </div>`;
}

function shortName(name){return name.replace(/preventa/i,'PREV').replace(/repartidor/i,'REP');}

// ── DRAG & DROP — DESKTOP ────────────────────────
function attachDragEvents(){
  document.querySelectorAll('.assign-chip').forEach(chip=>{
    chip.addEventListener('dragstart',onDragStart);
    chip.addEventListener('dragend',onDragEnd);
    chip.addEventListener('touchstart',onTouchStart,{passive:false});
    chip.addEventListener('touchmove',onTouchMove,{passive:false});
    chip.addEventListener('touchend',onTouchEnd);
  });
}
function onDragStart(e){
  const id=parseInt(e.currentTarget.dataset.id);
  const tipo=e.currentTarget.dataset.tipo;
  state.dragItem={id,tipo};
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',`${tipo}:${id}`);
}
function onDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
}
function onDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';e.currentTarget.classList.add('drag-over');}
function onDragLeave(e){e.currentTarget.classList.remove('drag-over');}
async function onDrop(e,driverId){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  let item=state.dragItem;
  if (!item){
    const raw=e.dataTransfer.getData('text/plain');
    const [tipo,id]=raw.split(':');
    item={tipo,id:parseInt(id)};
  }
  if (!item?.id) return;
  const userId=driverId==='pool'?null:driverId;
  await assignItem(item.id,item.tipo,userId);
}

// ── DRAG & DROP — TOUCH ──────────────────────────
let touchChip=null, touchOffX=0, touchOffY=0;
function onTouchStart(e){
  const chip=e.currentTarget;
  const touch=e.touches[0];
  const rect=chip.getBoundingClientRect();
  touchOffX=touch.clientX-rect.left; touchOffY=touch.clientY-rect.top;
  state.dragItem={id:parseInt(chip.dataset.id), tipo:chip.dataset.tipo};
  const preview=chip.cloneNode(true);
  preview.classList.add('drag-preview');
  preview.style.width=rect.width+'px';
  preview.style.left=(touch.clientX-touchOffX)+'px';
  preview.style.top=(touch.clientY-touchOffY)+'px';
  document.body.appendChild(preview);
  state.preview=preview; chip.classList.add('dragging'); touchChip=chip;
}
function onTouchMove(e){
  e.preventDefault();
  const touch=e.touches[0];
  if (state.preview){state.preview.style.left=(touch.clientX-touchOffX)+'px';state.preview.style.top=(touch.clientY-touchOffY)+'px';}
  document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
  const el=document.elementFromPoint(touch.clientX,touch.clientY);
  const zone=el?.closest('.assign-col-body,.assign-pool-row');
  if (zone) zone.classList.add('drag-over');
}
async function onTouchEnd(e){
  const touch=e.changedTouches[0];
  if (state.preview){state.preview.remove();state.preview=null;}
  if (touchChip){touchChip.classList.remove('dragging');touchChip=null;}
  document.querySelectorAll('.drag-over').forEach(el=>el.classList.remove('drag-over'));
  const el=document.elementFromPoint(touch.clientX,touch.clientY);
  const zone=el?.closest('.assign-col-body,.assign-pool-row');
  if (!zone||!state.dragItem) return;
  const driverId=zone.classList.contains('assign-pool-row')?null:parseInt(zone.dataset.driverId);
  await assignItem(state.dragItem.id,state.dragItem.tipo,isNaN(driverId)?null:driverId);
  state.dragItem=null;
}

// ── ASSIGN API CALL ──────────────────────────────
async function assignItem(id, tipo, userId){
  const item=state.allPickings.find(p=>p.id===id&&p.tipo===tipo);
  if (!item) return;
  // Optimistic update
  item.repartidor_id=userId;
  item.repartidor=userId?state.drivers.find(d=>d.id===userId)?.name||'':null;
  buildAssignView();
  try {
    const endpoint=tipo==='factura'?`/facturas/${id}/asignar`:`/entregas/${id}/asignar`;
    await apiFetch(endpoint,{method:'POST',body:JSON.stringify({user_id:userId})});
    const driverName=userId?shortName(state.drivers.find(d=>d.id===userId)?.name||''):'sin asignar';
    showToast(`${item.nombre} → ${driverName}`,'ok');
  } catch(e){
    showToast(`Error: ${e.message}`,'err');
    await loadAssignView(); // revert
  }
}

// ── RESUMEN ──────────────────────────────────────
async function loadResumen(){
  const c=document.getElementById('office-content');
  c.innerHTML=`<div class="loading-spinner"><div class="spinner"></div><div class="loading-text">Cargando…</div></div>`;
  try {
    const data=await apiFetch('/oficina/resumen');
    document.getElementById('office-date').textContent=formatDate(data.fecha);
    state.resumenData=data;
    let html=`<div class="stats-bar">
      <div class="stat-card"><div class="stat-num orange">${data.total}</div><div class="stat-label">Total</div></div>
      <div class="stat-card"><div class="stat-num green">${data.entregadas}</div><div class="stat-label">Entregados</div></div>
      <div class="stat-card"><div class="stat-num red">${data.pendientes}</div><div class="stat-label">Pendientes</div></div>
    </div>`;
    (data.repartidores||[]).forEach(rep=>{
      html+=`<div class="rep-group"><div class="rep-header">
        <div class="rep-name">${rep.repartidor}</div>
        <div class="rep-progress"><span class="done">${rep.entregadas}</span> / ${rep.total}${rep.total_cobrado?` · <span style="color:var(--blue)">€${rep.total_cobrado.toFixed(2)}</span>`:''}</div>
      </div>`;
      rep.entregas.forEach(e=>{html+=renderCard(e,'office');});
      html+=`</div>`;
    });
    if (!data.repartidores?.length) html+=`<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">Sin datos hoy</div></div>`;
    c.innerHTML=html;
  } catch(e){
    c.innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Error</div><div class="empty-sub">${e.message}</div></div>`;
  }
}

// ── TODOS ────────────────────────────────────────
async function loadTodos(){
  const c=document.getElementById('office-content');
  c.innerHTML=`<div class="loading-spinner"><div class="spinner"></div><div class="loading-text">Cargando…</div></div>`;
  try {
    const data=await apiFetch('/oficina/resumen');
    document.getElementById('office-date').textContent=formatDate(data.fecha);
    const all=(data.repartidores||[]).flatMap(r=>r.entregas);
    const pending=all.filter(e=>!e.entregado);
    const done=all.filter(e=>e.entregado);
    let html='';
    if (pending.length){html+=`<div class="section-header"><div class="section-title">Pendientes</div><div class="section-count">${pending.length}</div></div>`;pending.forEach(e=>{html+=renderCard(e,'office');});}
    if (done.length){html+=`<div class="section-header" style="margin-top:1rem"><div class="section-title">Entregados</div><div class="section-count">${done.length}</div></div>`;done.forEach(e=>{html+=renderCard(e,'office');});}
    if (!all.length) html=`<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-title">Sin entregas</div></div>`;
    c.innerHTML=html;
  } catch(e){
    c.innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Error</div><div class="empty-sub">${e.message}</div></div>`;
  }
}

// ── DRIVER ───────────────────────────────────────
async function loadDriverDeliveries(){
  const list=document.getElementById('driver-list');
  list.innerHTML=`<div class="loading-spinner"><div class="spinner"></div><div class="loading-text">Cargando…</div></div>`;
  try {
    const data=await apiFetch('/entregas/hoy');
    document.getElementById('driver-date').textContent=formatDate(data.fecha);
    const entregas=data.entregas||[];
    const pending=entregas.filter(e=>!e.entregado);
    const done=entregas.filter(e=>e.entregado);
    if (!entregas.length){list.innerHTML=`<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-title">Sin repartos hoy</div><div class="empty-sub">No tienes entregas asignadas para hoy</div></div>`;return;}
    let html=`<div class="stats-bar">
      <div class="stat-card"><div class="stat-num orange">${entregas.length}</div><div class="stat-label">Total</div></div>
      <div class="stat-card"><div class="stat-num green">${done.length}</div><div class="stat-label">Entregados</div></div>
      <div class="stat-card"><div class="stat-num red">${pending.length}</div><div class="stat-label">Pendientes</div></div>
    </div>`;
    if (pending.length){html+=`<div class="section-header"><div class="section-title">Pendientes</div><div class="section-count">${pending.length}</div></div>`;pending.forEach(e=>{html+=renderCard(e,'driver');});}
    if (done.length){html+=`<div class="section-header" style="margin-top:1rem"><div class="section-title">Entregados</div><div class="section-count">${done.length}</div></div>`;done.forEach(e=>{html+=renderCard(e,'driver');});}
    list.innerHTML=html;
  } catch(e){
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Error</div><div class="empty-sub">${e.message}</div></div>`;
  }
}

// ── CARD RENDERER ────────────────────────────────
function renderCard(e,ctx){
  const isDone=e.entregado;
  const lineas=(e.lineas||[]).map(l=>`<div class="card-line"><span>${esc(l.producto)}</span><span class="line-qty">${l.cantidad} ud.</span></div>`).join('');
  const notaHtml=e.nota?`<div class="card-note">${esc(e.nota)}</div>`:'';
  const notaRepHtml=e.nota_repartidor?`<div class="card-note" style="border-left-color:var(--blue)">💬 ${esc(e.nota_repartidor)}</div>`:'';
  const repBadge=ctx==='office'&&e.repartidor?`<span class="badge" style="background:rgba(58,142,245,.1);color:var(--blue)">${esc(e.repartidor)}</span>`:'';
  const actionHtml=isDone
    ?(ctx==='office'?`<button class="btn-desmarcar" onclick="desmarcarEntrega(${e.id},event)">Desmarcar</button>`:'')
    :`<button class="btn-entregar" onclick="openModal(${e.id},'${esc(e.cliente)}',event,${e.importe||0})">Marcar entregado</button>`;
  const tipoBadge = e.tipo === 'factura'
    ? `<span class="badge badge-fac">FAC</span>`
    : `<span class="badge badge-alb">ALB</span>`;
  const badges=[
    tipoBadge,
    isDone?`<span class="badge badge-done">✓ Entregado</span>`:`<span class="badge badge-pending">Pendiente</span>`,
    e.cobrado?`<span class="badge badge-cobrado">Cobrado</span>`:'',
    repBadge,
  ].join('');
  return `<div class="delivery-card ${isDone?'entregado':''}" id="card-${e.id}">
    <div class="card-header" onclick="toggleCard(${e.id})">
      <div class="card-status ${isDone?'done':'pending'}">${isDone?'✓':'→'}</div>
      <div class="card-info">
        <div class="card-client">${esc(e.cliente)}</div>
        <div class="card-meta"><span class="card-ref">${e.nombre}</span>${badges}</div>
      </div>
      <div class="card-arrow">›</div>
    </div>
    <div class="card-body">
      ${notaHtml}${notaRepHtml}
      ${lineas?`<div class="card-lines">${lineas}</div>`:''}
      ${actionHtml?`<div class="card-actions">${actionHtml}</div>`:''}
    </div>
  </div>`;
}
function toggleCard(id){document.getElementById(`card-${id}`)?.classList.toggle('open');}

// ── MODAL ────────────────────────────────────────
function openModal(pickingId,clientName,ev,importe){
  if(ev)ev.stopPropagation();
  state.pickingId=pickingId; state.formaPago='efectivo';
  document.getElementById('modal-client-name').textContent=clientName;
  document.getElementById('modal-nota').value='';
  document.querySelectorAll('.pago-opt').forEach(o=>o.classList.remove('active'));
  document.querySelector('.pago-opt').classList.add('active');
  // Si hay importe (factura), precargarlo y activar cobro
  if(importe && importe > 0){
    document.getElementById('toggle-cobrado').checked=true;
    document.getElementById('cobro-fields').style.display='block';
    document.getElementById('modal-importe').value=importe.toFixed(2);
  } else {
    document.getElementById('toggle-cobrado').checked=false;
    document.getElementById('cobro-fields').style.display='none';
    document.getElementById('modal-importe').value='';
  }
  document.getElementById('modal-entregar').classList.add('open');
}
function closeModal(){document.getElementById('modal-entregar').classList.remove('open');}
function onToggleCobrado(){document.getElementById('cobro-fields').style.display=document.getElementById('toggle-cobrado').checked?'block':'none';}
function selectPago(tipo,el){state.formaPago=tipo;document.querySelectorAll('.pago-opt').forEach(o=>o.classList.remove('active'));el.classList.add('active');}
async function confirmarEntrega(){
  const btn=document.getElementById('btn-confirm');
  const cobrado=document.getElementById('toggle-cobrado').checked;
  const importe=parseFloat(document.getElementById('modal-importe').value)||0;
  const nota=document.getElementById('modal-nota').value.trim();
  btn.disabled=true; btn.textContent='Guardando…';
  try {
    await apiFetch(`/entregas/${state.pickingId}/entregar`,{method:'POST',body:JSON.stringify({cobrado,importe:cobrado?importe:null,forma_pago:cobrado?state.formaPago:null,nota:nota||null})});
    closeModal(); showToast('Entrega confirmada ✓','ok');
    if(state.role==='repartidor') loadDriverDeliveries(); else refreshCurrentTab();
  } catch(e){showToast(e.message,'err');}
  finally{btn.disabled=false; btn.textContent='✓ Entregado';}
}
async function desmarcarEntrega(id,ev){
  if(ev)ev.stopPropagation();
  if(!confirm('¿Desmarcar esta entrega?'))return;
  try{await apiFetch(`/entregas/${id}/desmarcar`,{method:'POST'});showToast('Entrega desmarcada','ok');refreshCurrentTab();}
  catch(e){showToast(e.message,'err');}
}

// ── UTILS ────────────────────────────────────────
function formatDate(iso){if(!iso)return'';const d=new Date(iso+'T00:00:00');return d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}
let toastTimer;
function showToast(msg,type='ok'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;clearTimeout(toastTimer);toastTimer=setTimeout(()=>{t.className='toast';},2800);}

document.getElementById('modal-entregar').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

// ── RESTORE SESSION ──────────────────────────────
(function(){
  const token=sessionStorage.getItem('rp_token');
  const role=sessionStorage.getItem('rp_role');
  if(token&&role){
    state.token=token; state.role=role;
    state.userName=sessionStorage.getItem('rp_user_name');
    state.userId=parseInt(sessionStorage.getItem('rp_user_id'));
    enterApp();
  }
})();
</script>
